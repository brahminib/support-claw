name: SupportClaw
options:
  bundleIdPrefix: ai.supportClawfoundation
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  SupportClawKit:
    path: ../shared/SupportClawKit
  Swabble:
    path: ../swabble
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 147.0.0

schemes:
  SupportClaw:
    shared: true
    build:
      targets:
        SupportClaw: all
    test:
      targets:
        - SupportClawTests
        - SupportClawLogicTests
  SupportClawLogicTests:
    shared: true
    build:
      targets:
        SupportClawLogicTests: all
    test:
      targets:
        - SupportClawLogicTests
  SupportClawUITests:
    shared: true
    build:
      targets:
        SupportClawUITests: all
    test:
      targets:
        - SupportClawUITests
  SupportClawWatchApp:
    shared: true
    build:
      targets:
        SupportClawWatchApp: all

targets:
  SupportClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: SupportClawShareExtension
        embed: true
      - target: SupportClawActivityWidget
        embed: true
      # A companion watch application belongs in the standard Watch bundle location.
      # PlugIns is for extension products and breaks paired watch installation.
      - target: SupportClawWatchApp
      - package: SupportClawKit
      - package: SupportClawKit
        product: SupportClawChatUI
      - package: SupportClawKit
        product: SupportClawProtocol
      - package: Swabble
        product: SwabbleKit
      - package: WebRTC
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchApp,$SRCROOT/../shared/SupportClawKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(SUPPORT_CLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_ENTITLEMENTS: Sources/SupportClaw.entitlements
        CODE_SIGN_STYLE: "$(SUPPORT_CLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUPPORT_CLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUPPORT_CLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SUPPORT_CLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          SUPPORT_CLAW_APNS_ENTITLEMENT_ENVIRONMENT: development
          SUPPORT_CLAW_PUSH_TRANSPORT: direct
          SUPPORT_CLAW_PUSH_DISTRIBUTION: local
          SUPPORT_CLAW_PUSH_RELAY_BASE_URL: ""
          SUPPORT_CLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          SUPPORT_CLAW_APNS_ENTITLEMENT_ENVIRONMENT: production
          SUPPORT_CLAW_PUSH_TRANSPORT: direct
          SUPPORT_CLAW_PUSH_DISTRIBUTION: local
          SUPPORT_CLAW_PUSH_RELAY_BASE_URL: ""
          SUPPORT_CLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SupportClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.supportClawfoundation.app
            CFBundleURLSchemes:
              - supportClaw
        CFBundleShortVersionString: "$(SUPPORT_CLAW_MARKETING_VERSION)"
        SupportClawCanonicalVersion: "$(SUPPORT_CLAW_IOS_VERSION)"
        SupportClawAppGroupIdentifier: "$(SUPPORT_CLAW_APP_GROUP_ID)"
        CFBundleVersion: "$(SUPPORT_CLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - "$(SUPPORT_CLAW_APP_BUNDLE_ID).bgrefresh"
        NSLocalNetworkUsageDescription: SupportClaw discovers and connects to your SupportClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
          NSAllowsLocalNetworking: true
        NSBonjourServices:
          - _supportClaw-gw._tcp
        NSCameraUsageDescription: SupportClaw can capture photos or short video clips when requested via the gateway.
        NSCalendarsUsageDescription: SupportClaw uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsFullAccessUsageDescription: SupportClaw uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsWriteOnlyAccessUsageDescription: SupportClaw uses your calendars to add events when you enable calendar access.
        NSContactsUsageDescription: SupportClaw uses your contacts so you can search and reference people while using the assistant.
        NSLocationWhenInUseUsageDescription: SupportClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: SupportClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: SupportClaw uses the microphone for realtime chat, voice wake, and push-to-talk.
        NSMotionUsageDescription: SupportClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: SupportClaw needs photo library access when you choose existing photos to share with your assistant.
        NSRemindersFullAccessUsageDescription: SupportClaw uses your reminders to list, add, and complete tasks when you enable reminders access.
        NSSpeechRecognitionUsageDescription: SupportClaw uses on-device speech recognition for talk mode and voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        SupportClawPushTransport: "$(SUPPORT_CLAW_PUSH_TRANSPORT)"
        SupportClawPushDistribution: "$(SUPPORT_CLAW_PUSH_DISTRIBUTION)"
        SupportClawPushRelayBaseURL: "$(SUPPORT_CLAW_PUSH_RELAY_BASE_URL)"
        SupportClawPushAPNsEnvironment: "$(SUPPORT_CLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  SupportClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: SupportClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(SUPPORT_CLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/SupportClawShareExtension.entitlements
        CODE_SIGN_STYLE: "$(SUPPORT_CLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUPPORT_CLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUPPORT_CLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SUPPORT_CLAW_SHARE_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: SupportClaw Share
        CFBundleShortVersionString: "$(SUPPORT_CLAW_MARKETING_VERSION)"
        SupportClawAppGroupIdentifier: "$(SUPPORT_CLAW_APP_GROUP_ID)"
        CFBundleVersion: "$(SUPPORT_CLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  SupportClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/SupportClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(SUPPORT_CLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(SUPPORT_CLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUPPORT_CLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUPPORT_CLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SUPPORT_CLAW_ACTIVITY_WIDGET_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: SupportClaw Activity
        CFBundleShortVersionString: "$(SUPPORT_CLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUPPORT_CLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  SupportClawWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
        excludes:
          - Info.plist
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(SUPPORT_CLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(SUPPORT_CLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "$(SUPPORT_CLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(SUPPORT_CLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUPPORT_CLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUPPORT_CLAW_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SUPPORT_CLAW_WATCH_APP_PROFILE)"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: SupportClaw
        CFBundleShortVersionString: "$(SUPPORT_CLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUPPORT_CLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(SUPPORT_CLAW_APP_BUNDLE_ID)"
        WKApplication: true

  SupportClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: SupportClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(SUPPORT_CLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(SUPPORT_CLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUPPORT_CLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUPPORT_CLAW_APP_BUNDLE_ID).tests"
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SupportClaw.app/SupportClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: SupportClawTests
        CFBundleShortVersionString: "$(SUPPORT_CLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUPPORT_CLAW_BUILD_VERSION)"

  SupportClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: SupportClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(SUPPORT_CLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(SUPPORT_CLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUPPORT_CLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUPPORT_CLAW_APP_BUNDLE_ID).logic-tests"
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: SupportClawLogicTests
        CFBundleShortVersionString: "$(SUPPORT_CLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUPPORT_CLAW_BUILD_VERSION)"

  SupportClawUITests:
    type: bundle.ui-testing
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: UITests
    dependencies:
      - target: SupportClaw
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(SUPPORT_CLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(SUPPORT_CLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUPPORT_CLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUPPORT_CLAW_APP_BUNDLE_ID).ui-tests"
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TEST_TARGET_NAME: SupportClaw
        SWIFT_VERSION: "5.0"
    info:
      path: UITests/Info.plist
      properties:
        CFBundleDisplayName: SupportClawUITests
        CFBundleShortVersionString: "$(SUPPORT_CLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUPPORT_CLAW_BUILD_VERSION)"
