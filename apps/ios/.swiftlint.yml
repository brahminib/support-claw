parent_config: ../../config/swiftlint.yml

included:
  - Sources
  - ShareExtension
  - ActivityWidget
  - WatchApp
  - ../shared/SupportClawKit/Sources/SupportClawChatUI

excluded:
  - ../macos

type_body_length:
  warning: 900
  error: 1300

custom_rules:
  supportClaw_design_colors:
    name: "SupportClaw design colors"
    excluded:
      - Sources/Design/SupportClawBrand.swift
      - ../shared/SupportClawKit/Sources/SupportClawChatUI/ChatTheme.swift
    regex: '(Color\.accentColor|(^|[^A-Za-z0-9_])\.accentColor\b|Color\.(red|green|orange|cyan|blue|yellow|purple|pink)\b|\.(foregroundStyle|tint|fill|stroke|strokeBorder|background)\(\s*\.(red|green|orange|cyan|blue|yellow|purple|pink)\b|Color\(red:\s*0\s*/\s*255\.0,\s*green:\s*122\s*/\s*255\.0,\s*blue:\s*255\s*/\s*255\.0\))'
    message: "Use SupportClawBrand or SupportClawChatTheme design tokens instead of raw accent/status colors."
    severity: error
